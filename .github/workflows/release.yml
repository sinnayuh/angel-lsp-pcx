name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run compile

      - name: Bump patch version
        id: version
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [a, b, c] = p.version.split('.');
            p.version = a + '.' + b + '.' + (parseInt(c) + 1);
            fs.writeFileSync('package.json', JSON.stringify(p, null, 4) + '\n');
            console.log(p.version);
          "
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: bunx @vscode/vsce package --no-dependencies

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi

          CHANGELOG=$(awk '/^## \[Perception Fork\]/{found=1; next} found && /^---/{exit} found{print}' CHANGELOG.md | sed '/^[[:space:]]*$/d')

          {
            echo "## What's in this release"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## Perception API"
            echo ""
            echo "$CHANGELOG"
          } > release_notes.md

          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: "*.vsix"
          draft: false
          prerelease: false
